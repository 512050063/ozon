<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>1688 授权回调</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
    }
    .box {
      background: #fff;
      border-radius: 12px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      max-width: 400px;
      width: 90%;
    }
    .icon { font-size: 44px; margin-bottom: 12px; }
    h2 { margin: 0 0 8px; font-size: 17px; color: #303133; font-weight: 600; }
    p { margin: 0 0 10px; font-size: 13px; color: #909399; line-height: 1.6; }
    .code-box {
      font-family: monospace;
      background: #f5f7fa;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      word-break: break-all;
      margin-top: 10px;
      color: #303133;
      border: 1px solid #e4e7ed;
      cursor: pointer;
      user-select: all;
    }
    .success { color: #67c23a; }
    .warning { color: #e6a23c; }
    .error { color: #f56c6c; }
    .copy-btn {
      margin-top: 10px;
      padding: 6px 18px;
      background: #1677ff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .copy-btn:hover { background: #0958d9; }
    .retry-btn {
      margin-top: 10px;
      padding: 6px 18px;
      background: #67c23a;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .retry-btn:hover { background: #52b425; }
    .countdown { color: #1677ff; font-weight: 600; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e4e7ed;
      border-top-color: #1677ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div id="content"></div>
  </div>

  <script>
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text || '');
      return div.innerHTML;
    }

    function copyCode() {
      const codeText = document.getElementById('codeText');
      if (codeText) {
        navigator.clipboard.writeText(codeText.textContent).then(function() {
          const btn = document.querySelector('.copy-btn');
          if (btn) { btn.textContent = '已复制'; }
        }).catch(function(){});
      }
    }

    function getBackendUrl() {
      // 1. 优先使用 localStorage 中存储的后端地址（手动覆盖）
      try {
        var stored = localStorage.getItem('backend_url');
        if (stored) return stored.replace(/\/+$/, '');
      } catch(e) {}
      // 2. HTTP(S) 页面默认回落到当前页面同源地址
      //    生产环境下 callback.html 通常与后端同域部署，直接走同源 /api；
      //    开发环境下 Vite 会把 /api 代理到本地后端。
      if (window.location && /^https?:$/.test(window.location.protocol)) {
        return window.location.origin.replace(/\/+$/, '');
      }
      // 3. 如果直接以 file:// 打开，退回本地后端，方便离线调试
      return 'http://localhost:3000';
    }

    async function exchangeToken(code) {
      var content = document.getElementById('content');
      content.innerHTML =
        '<div class="spinner"></div>' +
        '<h2>正在换取 Token...</h2>' +
        '<p>请稍候，正在连接后端服务</p>';

      var backendUrl = getBackendUrl();
      // 从URL读取state参数，传给后端用于识别用户（callback.html跨域无法携带JWT）
      var urlObj = new URL(window.location.href);
      var stateParam = urlObj.searchParams.get('state') || '';
      var tokenUrl = new URL('/api/alibaba/auth/token', backendUrl).toString() + '?code=' + encodeURIComponent(code);
      if (stateParam) {
        tokenUrl += '&state=' + encodeURIComponent(stateParam);
      }
      var jwtToken = '';
      try { jwtToken = localStorage.getItem('token') || ''; } catch(e) {}

      try {
        // 使用 AbortController 设置 15 秒超时
        var controller = new AbortController();
        var timeoutId = setTimeout(function() {
          controller.abort();
        }, 15000);

        var response = await fetch(tokenUrl, {
          signal: controller.signal,
          headers: {
            'Authorization': 'Bearer ' + jwtToken
          }
        });
        clearTimeout(timeoutId);

        var data = await response.json();

        if (data.success) {
          content.innerHTML =
            '<div class="icon success">✅</div>' +
            '<h2 class="success">授权成功</h2>' +
            '<p>Token 已获取成功！</p>' +
            '<p class="countdown">窗口将在 3 秒后自动关闭</p>';

          // 通知父窗口 Token 已就绪
          if (window.opener && !window.opener.closed) {
            try {
              window.opener.postMessage({ type: 'ALIBABA_AUTH_SUCCESS', code: code }, '*');
            } catch (e) {
              console.error('postMessage success notify failed:', e);
            }
          }

          setTimeout(function() { window.close(); }, 3000);
        } else {
          content.innerHTML =
            '<div class="icon error">❌</div>' +
            '<h2 class="error">换取 Token 失败</h2>' +
            '<p>' + escapeHtml(data.message || '未知错误') + '</p>' +
            '<p>请手动复制下方授权码，粘贴到前端设置页面</p>' +
            '<div class="code-box" id="codeText">' + escapeHtml(code) + '</div>' +
            '<button class="copy-btn" onclick="copyCode()">复制授权码</button>';
        }
      } catch (error) {
        console.error('获取Token失败:', error);
        var isTimeout = error && error.name === 'AbortError';
        content.innerHTML =
          '<div class="icon error">❌</div>' +
          '<h2 class="error">' + (isTimeout ? '请求超时' : '网络请求失败') + '</h2>' +
          '<p>' + (isTimeout ? '连接后端服务超时（15秒），请检查后端是否正常运行' : '无法连接到后端服务，请检查网络') + '</p>' +
          '<p>请手动复制下方授权码，粘贴到前端设置页面</p>' +
          '<div class="code-box" id="codeText">' + escapeHtml(code) + '</div>' +
          '<button class="copy-btn" onclick="copyCode()">复制授权码</button>' +
          '<br><button class="retry-btn" onclick="exchangeToken(\'' + escapeHtml(code) + '\')">重试</button>';
      }
    }

    (function() {
      var url = new URL(window.location.href);
      var code = url.searchParams.get('code');
      var content = document.getElementById('content');

      if (!code) {
        content.innerHTML =
          '<div class="icon error">❌</div>' +
          '<h2 class="error">授权失败</h2>' +
          '<p>URL 中未找到 code 参数</p>' +
          '<p>请从1688开放平台重新发起授权</p>';
        return;
      }

      // 先通知父窗口授权已开始（如果存在）
      if (window.opener && !window.opener.closed) {
        try {
          window.opener.postMessage({ type: 'ALIBABA_AUTH_START', code: code }, '*');
        } catch (e) {
          console.error('postMessage failed:', e);
        }
      }

      // 不再依赖 postMessage，直接通过本页换取 Token
      // 这样即使跨域导致 postMessage 失败，后端也能保存 Token
      exchangeToken(code);
    })();
  </script>
</body>
</html>
